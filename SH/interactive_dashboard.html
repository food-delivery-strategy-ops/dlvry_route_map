                    [0, '#313695'],      // 0: 진한 파랑
                    [0.4, '#abd9e9'],    // 2.0: 연한 하늘색 (파란 톤 유지의 끝)
                    [0.41, '#fee090'],   // 2.05: 노란색 급격히 등장
                    [0.7, '#f46d43'],    // 3.5: 주황색
                    [1, '#a50026']       // 5.0: 진한 빨강
                ],
                showscale: true,
                colorbar: { 
                    title: '60분 초과율 (%)',
                    tickvals: [0, 1, 2, 3, 4, 5],
                    ticktext: ['0', '1', '2(주의)', '3', '4', '5']
                },
                line: { width: 1, color: 'white' }
            },
            type: 'scatter'
        };

        const layout = {
            xaxis: { 
                title: 'QSH 비중 (%)', 
                range: [20, 100], 
                gridcolor: '#eee', 
                fixedrange: true 
            },
            yaxis: { 
                title: '건당 SH', 
                range: [0.15, 0.40], 
                gridcolor: '#eee', 
                fixedrange: true 
            },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            margin: { t: 50, b: 80 }
        };

        Plotly.newPlot('chartDiv', [trace], layout);
    }

    // 초기 실행
    updateChart();
</script>
</body>
</html>
