    let currentTab = 'date';

    const dateSelect = document.getElementById('dateSelect');
    const weekSelect = document.getElementById('weekSelect');
    const groupSelect = document.getElementById('groupSelect');
    const regionSelect = document.getElementById('regionSelect');

    const dates = [...new Set(allData.dateData.map(d => d.part_date))].sort().reverse();
    const weeks = [...new Set(allData.weekData.map(d => d.part_week))].sort().reverse();
    const groupsRaw = [...new Set(allData.dateData.map(d => d.동질그룹))].sort();

    dates.forEach(d => dateSelect.add(new Option(d, d)));
    weeks.forEach(w => weekSelect.add(new Option(w, w)));
    ["전체", ...groupsRaw].forEach(g => groupSelect.add(new Option(g, g)));

    function switchTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');

        document.getElementById('dateFilterGroup').classList.toggle('hidden', tabName !== 'date');
        document.getElementById('weekFilterGroup').classList.toggle('hidden', tabName !== 'week');

        // 탭을 바꿔도 지역 박스 목록만 갱신하고, 선택값은 유지 시도
        updateRgnOptions();
        updateChart();
    }

    function updateRgnOptions() {
        // [수정] 현재 선택되어 있는 지역명을 변수에 저장
        const previousSelectedRegion = regionSelect.value;

        const selectedGroup = groupSelect.value;
        let dataSet = currentTab === 'date' ? allData.dateData : allData.weekData;
        let timeVal = currentTab === 'date' ? dateSelect.value : weekSelect.value;

        let filtered = dataSet.filter(d => (currentTab === 'date' ? d.part_date : d.part_week) === timeVal);
        if (selectedGroup !== "전체") {
            filtered = filtered.filter(d => d.동질그룹 === selectedGroup);
        }

        const sortedRegions = [...new Set(filtered.map(d => d.full_region))].sort();
        const finalRegions = ["전체", ...sortedRegions];

        regionSelect.innerHTML = "";
        finalRegions.forEach(r => regionSelect.add(new Option(r, r)));

        // [핵심] 이전에 선택했던 지역이 새로 생성된 목록에도 있다면 다시 선택해줌
        if (finalRegions.includes(previousSelectedRegion)) {
            regionSelect.value = previousSelectedRegion;
        } else {
            regionSelect.value = "전체"; // 목록에 없으면(예: 그룹이 바뀌어 해당 지역이 없는 경우) 전체로 초기화
        }
    }

    function updateChart() {
        const selectedGroup = groupSelect.value;
        const selectedFullRegion = regionSelect.value;
        let dataSet = currentTab === 'date' ? allData.dateData : allData.weekData;
        let timeVal = currentTab === 'date' ? dateSelect.value : weekSelect.value;

        let baseFiltered = dataSet.filter(d => (currentTab === 'date' ? d.part_date : d.part_week) === timeVal);

        if (selectedGroup !== "전체") {
            baseFiltered = baseFiltered.filter(d => d.동질그룹 === selectedGroup);
        }

        // 지역 검색 필터 적용
        if (selectedFullRegion !== "전체") {
            baseFiltered = baseFiltered.filter(d => d.full_region === selectedFullRegion);
        }

        const groupsToDraw = selectedGroup === "전체" ? groupsRaw : [selectedGroup];

        const dataTraces = groupsToDraw.map(group => {
            const groupData = baseFiltered.filter(d => d.동질그룹 === group);

            return {
                x: groupData.map(d => d.QSH_ratio),
                y: groupData.map(d => d.건당SH),
                text: groupData.map(d => d.pickup_rgn2_nm),
                mode: 'markers+text',
                textposition: 'top center',
                textfont: { size: 10, color: '#444' },
                name: group,
                showlegend: false,
                hovertext: groupData.map(d => 
                    `<b>${d.full_region}</b> (${d.동질그룹})<br>` +
                    `QSH 비중: ${d.QSH_ratio}%<br>` +
                    `건당 SH: ${d.건당SH}<br>` +
                    `품질(DT): ${d.DT_60min}%`
                ),
                hoverinfo: 'text',
                marker: {
                    size: 18,
                    color: groupData.map(d => d.DT_60min),
                    cmin: 0, cmax: 5,
                    colorscale: [
                        [0, '#313695'], [0.4, '#abd9e9'], [0.41, '#fee090'], [0.7, '#f46d43'], [1, '#a50026']
                    ],
                    showscale: group === groupsToDraw[groupsToDraw.length - 1],
                    colorbar: { title: 'DT_60min (%)' },
                    line: { width: 1, color: 'white' }
                },
                type: 'scatter'
            };
        });

        const layout = {
            xaxis: { title: 'QSH 비중 (%)', range: [20, 100], gridcolor: '#eee', fixedrange: true },
            yaxis: { title: '건당 SH', range: [0.15, 0.40], gridcolor: '#eee', fixedrange: true },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            margin: { t: 50, b: 80 }
        };

        Plotly.newPlot('chartDiv', dataTraces, layout);
    }

    updateRgnOptions();
    updateChart();
</script>
