    // 지역 옵션 (가나다순 정렬 후 '전체'를 맨 앞으로)
    const sortedRgn1s = [...new Set(rawData.map(d => d.pickup_rgn1_nm))].sort();

    const weekSelect = document.getElementById('weekSelect');
    const rgn1Select = document.getElementById('rgn1Select');

    weeks.forEach(w => weekSelect.add(new Option(w, w)));
    rgn1s.forEach(r => rgn1Select.add(new Option(r, r)));

    function updateChart() {
        const selectedWeek = weekSelect.value;
        const selectedRgn1 = rgn1Select.value;

        let filtered = rawData.filter(d => d.part_week === selectedWeek);
        if (selectedRgn1 !== "전체") {
            filtered = filtered.filter(d => d.pickup_rgn1_nm === selectedRgn1);
        }

        const hoverTexts = filtered.map(d => 
            `<b>${d.pickup_rgn2_nm}</b><br>` +
            `QSH 비율: ${d.QSH_ratio}%<br>` +
            `건당 SH: ${d.건당SH}<br>` +
            `품질(DT): ${d.DT_60min}%`
        );

        const trace = {
            x: filtered.map(d => d.QSH_ratio),
            y: filtered.map(d => d.건당SH),
            text: filtered.map(d => d.pickup_rgn2_nm),
            hovertext: hoverTexts,
            hoverinfo: 'text',
            mode: 'markers+text',
            textposition: 'top center',
            marker: {
                size: 18,
                color: filtered.map(d => d.DT_60min),
                cmin: 0, cmax: 5,
                colorscale: [[0, '#313695'], [0.4, '#fee090'], [1, '#a50026']],
                showscale: true,
                colorbar: { title: 'DT_60min' },
                line: { width: 1, color: 'white' }
            },
            type: 'scatter'
        };

        const layout = {
            xaxis: { title: 'QSH_ratio (%)', range: [20, 100], gridcolor: '#eee', fixedrange: true },
            yaxis: { title: '건당SH (원)', range: [0.15, 0.40], gridcolor: '#eee', fixedrange: true },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            margin: { t: 50, b: 80 }
        };

        Plotly.newPlot('chartDiv', [trace], layout);
    }

    updateChart();
