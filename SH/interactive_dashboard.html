                color: filtered.map(d => d.DT_60min),
                cmin: 0, cmax: 5,
                colorscale: [[0, '#313695'], [0.4, '#fee090'], [1, '#a50026']],
                showscale: true,
                colorbar: { title: 'DT_60min' },
                line: { width: 1, color: 'white' }
            },
            type: 'scatter'
        };

        const layout = {
            xaxis: { title: 'QSH_ratio (%)', range: [20, 100], gridcolor: '#eee', fixedrange: true },
            yaxis: { title: '건당SH', range: [0.15, 0.40], gridcolor: '#eee', fixedrange: true },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            margin: { t: 50, b: 80 }
        };

        Plotly.newPlot('chartDiv', [trace], layout);
    }

    updateChart();
</script>
</body>
</html>
